
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100% !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#AFA9EC' : '#534AB7',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    edgeLabelBackground: dark ? '#2C2C2A' : '#F1EFE8',
  },
});
const diagram = `erDiagram
  TENANT {
    uuid id PK
    string subdomain
    string display_name
    string plan_tier
    string status
    timestamp created_at
    timestamp modified_at
    string created_by
    string modified_by
  }
  USER_ACCOUNT {
    uuid id PK
    uuid tenant_id FK
    string email
    string full_name
    string role
    boolean is_active
    timestamp created_at
    timestamp modified_at
  }
  VEHICLE {
    uuid id PK
    uuid tenant_id FK
    string plate_number
    string make
    string model
    integer year
    string status
    string vin
    timestamp last_service_at
    timestamp created_at
    timestamp modified_at
    string created_by
    string modified_by
  }
  DRIVER {
    uuid id PK
    uuid tenant_id FK
    uuid user_account_id FK
    string license_number
    string license_class
    date license_expiry
    string status
    timestamp created_at
    timestamp modified_at
    string created_by
    string modified_by
  }
  ASSIGNMENT {
    uuid id PK
    uuid tenant_id FK
    uuid vehicle_id FK
    uuid driver_id FK
    timestamp start_time
    timestamp end_time
    string status
    string notes
    timestamp created_at
    timestamp modified_at
    string created_by
    string modified_by
  }
  MAINTENANCE_RECORD {
    uuid id PK
    uuid tenant_id FK
    uuid vehicle_id FK
    uuid assigned_technician_id FK
    string type
    string severity
    string status
    text description
    text resolution_notes
    decimal cost
    timestamp scheduled_at
    timestamp completed_at
    timestamp created_at
    timestamp modified_at
    string created_by
    string modified_by
  }
  ALERT {
    uuid id PK
    uuid tenant_id FK
    uuid vehicle_id FK
    uuid maintenance_record_id FK
    string alert_type
    string severity
    string status
    text message
    timestamp triggered_at
    timestamp acknowledged_at
    string acknowledged_by
  }
  AUDIT_LOG {
    uuid id PK
    uuid tenant_id FK
    string entity_type
    uuid entity_id
    string action
    string actor_id
    jsonb changes
    timestamp occurred_at
  }

  TENANT ||--o{ USER_ACCOUNT : "has"
  TENANT ||--o{ VEHICLE : "owns"
  TENANT ||--o{ DRIVER : "employs"
  TENANT ||--o{ ASSIGNMENT : "scopes"
  TENANT ||--o{ MAINTENANCE_RECORD : "scopes"
  TENANT ||--o{ ALERT : "scopes"
  USER_ACCOUNT ||--o| DRIVER : "may be"
  VEHICLE ||--o{ ASSIGNMENT : "assigned via"
  DRIVER ||--o{ ASSIGNMENT : "takes"
  VEHICLE ||--o{ MAINTENANCE_RECORD : "has"
  USER_ACCOUNT ||--o{ MAINTENANCE_RECORD : "works"
  MAINTENANCE_RECORD ||--o{ ALERT : "triggers"
  VEHICLE ||--o{ ALERT : "generates"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
